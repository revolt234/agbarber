name: prenotazionibarbiere
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.8+12

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.3
  cloud_firestore: ^6.6.0
  intl: ^0.20.2
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.0
  firebase_remote_config: ^6.5.3
  package_info_plus: ^10.2.0
  url_launcher: ^6.3.2
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/A di barber.png
    - assets/logoGerry.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logoGerry.png"
  # Parametri corretti per la versione 0.14.x (Forziamo il tuo colore verde per la Home):
  adaptive_icon_background: "#164638"
  adaptive_icon_foreground: "assets/logoGerry.png"